name: Checks

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout dbx dependency
        env:
          # Pin the dbx path-dependency to a known-good commit for reproducible
          # builds. `Cargo.toml` uses a `path = "../dbx/..."` dependency whose
          # source is NOT constrained by Cargo.lock, so without this pin every
          # run would silently pull dbx's moving main HEAD. Bump deliberately.
          DBX_REF: 3f6e885ee0c5fdfde2d91d461b03f518068e8a4e
        run: |
          set -euo pipefail
          git init ../dbx
          git -C ../dbx fetch --depth 1 https://github.com/Aho1ic/dbx.git "$DBX_REF"
          git -C ../dbx checkout --detach "$DBX_REF"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Clippy
        run: >
          cargo clippy --manifest-path src-tauri/Cargo.toml --locked
          -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Run tests
        run: pnpm test

      - name: Run web build
        run: pnpm build
